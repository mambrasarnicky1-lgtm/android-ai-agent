name: Noir Sovereign Elite v17.5 OMEGA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
        python -m pip install --upgrade pip
        pip install Cython==0.29.33 buildozer

    - name: Build with Buildozer
      run: |
        # Fix broken dependencies and install system requirements
        sudo apt-get update
        sudo apt-get install -f -y
        sudo apt-get install -y libunwind-dev
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libsqlite3-dev \
          sqlite3 \
          libssl-dev \
          libffi-dev \
          unzip \
          zip \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libtool-bin \
          libltdl-dev \
          autopoint \
          gettext

        # Build APK
        yes | buildozer android release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: noir-sovereign-apk
        path: bin/*.apk
