# NOIR SOVEREIGN COMMANDER v14.0.20 - Release Build Pipeline
name: Build Noir SMC Android APK (Release)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev \
            sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev \
            libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev \
            libffi-dev uuid-dev libtool automake autoconf cmake ant \
            openjdk-17-jdk zip unzip pkg-config libunwind-dev

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer # Using stable Cython 0.29.x

      - name: Build Android Release APK
        run: |
          # DEEP PURGE: Ensure no stale artifacts from previous failed runs
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          
          # Diagnostic: Show spec file content
          cat buildozer.spec
          
          # Dynamically ensure version is set correctly
          sed -i 's/^version =.*/version = 14.0.32/' buildozer.spec
          
          # Unset conflicting NDK/SDK environment variables
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_HOME
          unset ANDROID_SDK_ROOT
          
          # Build release
          buildozer android release
        env:
          P4A_RELEASE_KEYSTORE: "mobile_app/noir_smc_release.keystore"
          P4A_RELEASE_KEYSTORE_PASSWD: "NoirSovereign#2026!"
          P4A_RELEASE_KEYALIAS_PASSWD: "NoirSovereign#2026!"
          P4A_RELEASE_KEYALIAS: "noir_smc"
          NOIR_GATEWAY_URL: "https://noir-agent-gateway.si-umkm-ikm-pbd.workers.dev"
          NOIR_API_KEY: "NOIR_AGENT_KEY_V6_SI_UMKM_PBD_2026"

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NoirSovereign-v14-Release-APK
          path: bin/*.apk
