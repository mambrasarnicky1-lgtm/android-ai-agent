# NOIR SOVEREIGN COMMANDER v14.0.9 - Android Build Pipeline
name: Build Noir SMC Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          workdir: mobile_app
          buildozer_version: master
        env:
          # Inject secrets for buildozer.spec interpolation if needed
          NOIR_GATEWAY_URL: "https://noir-agent-gateway.si-umkm-ikm-pbd.workers.dev"
          NOIR_API_KEY: "NOIR_AGENT_KEY_V6_SI_UMKM_PBD_2026"
          NOIR_DEVICE_ID: "REDMI_NOTE_14"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Noir-SMC-v14-APK
          path: mobile_app/bin/*.apk
