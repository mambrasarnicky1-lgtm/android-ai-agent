name: Noir Sovereign V21.1 NATIVE Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'



      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev \
            sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev \
            libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev \
            libffi-dev uuid-dev libtool automake autoconf cmake ant \
            zip unzip pkg-config libunwind-dev

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer 
          cython --version

      - name: Build Android Release APK
        run: |
          # Unset conflicting NDK/SDK environment variables
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_HOME
          unset ANDROID_SDK_ROOT
          
          # Build release
          yes | buildozer -v android release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          P4A_RELEASE_KEYSTORE: "${{ github.workspace }}/noir_sovereign.keystore"
          P4A_RELEASE_KEYSTORE_PASSWD: "#Nicolay1992"
          P4A_RELEASE_KEYALIAS_PASSWD: "#Nicolay1992"
          P4A_RELEASE_KEYALIAS: "Nicolay_Noir_Sovereign"

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Noir-Sovereign-V21.1-NATIVE-APK
          path: bin/*.apk
