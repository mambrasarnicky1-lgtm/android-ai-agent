# NOIR SOVEREIGN COMMANDER v14.0.20 - Release Build Pipeline
name: Build Noir SMC Android APK (Release)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Switching to latest available runner for faster pick-up
    steps:
      - uses: actions/checkout@v4

      - name: Cache Buildozer & NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev \
            sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev \
            libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev \
            libffi-dev uuid-dev libtool automake autoconf cmake ant \
            openjdk-17-jdk zip unzip pkg-config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build Android Release APK
        run: |
          # Diagnostic: Show spec file content
          cat buildozer.spec
          # Dynamically ensure version is set correctly
          sed -i 's/^version =.*/version = 14.0.32/' buildozer.spec
          # Use yes to accept all licenses and trigger release build
          yes | buildozer android release
        env:
          # Signing Credentials (User should set these in GitHub Secrets)
          P4A_RELEASE_KEYSTORE: "mobile_app/noir_smc_release.keystore"
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.NOIR_KEYSTORE_PASS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.NOIR_KEYSTORE_PASS }}
          P4A_RELEASE_KEYALIAS: "noir_smc"
          # App Config
          NOIR_GATEWAY_URL: ${{ secrets.NOIR_GATEWAY_URL }}
          NOIR_API_KEY: ${{ secrets.NOIR_API_KEY }}

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NoirSovereign-v14-Release-APK
          path: bin/*.apk
