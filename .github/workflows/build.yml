name: Build Noir SMC Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('mobile_app/buildozer.spec') }}

      - name: Cache Buildozer local directory
        uses: actions/cache@v4
        with:
          path: mobile_app/.buildozer
          key: buildozer-local-${{ hashFiles('mobile_app/buildozer.spec') }}-${{ hashFiles('mobile_app/main.py') }}
          restore-keys: |
            buildozer-local-${{ hashFiles('mobile_app/buildozer.spec') }}-

      - name: Build APK with official Kivy/Buildozer Docker image
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/mobile_app:/home/user/hostcwd \
            -v ~/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: List built APKs
        run: |
          find ${{ github.workspace }}/mobile_app/bin -name "*.apk" 2>/dev/null || echo "No APK found in bin/"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SovereignCore-APK
          path: mobile_app/bin/*.apk
          retention-days: 30
