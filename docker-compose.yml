version: '3.8'

services:
  noir-brain:
    build: .
    container_name: noir-brain
    restart: always
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    networks:
      - noir-net
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/noir-vps/brain.py') else 1)"]
      interval: 1m
      timeout: 10s
      retries: 3

  noir-dashboard:
    build: .
    container_name: noir-dashboard
    restart: always
    working_dir: /app/noir-ui
    volumes:
      - ./.env:/app/.env
      - ./noir-ui:/app/noir-ui
    ports:
      - "80:80"
    # v18.4 Optimization: Using gunicorn for better concurrency on 4GB RAM
    command: gunicorn --bind 0.0.0.0:80 --workers 3 web_server:app
    networks:
      - noir-net
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 1m
      timeout: 10s
      retries: 3

  noir-telegram:
    build: .
    container_name: noir-telegram
    restart: always
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    networks:
      - noir-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    command: python noir-vps/telegram_bot.py

  noir-researcher:
    build: .
    container_name: noir-researcher
    restart: always
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    networks:
      - noir-net
    deploy:
      resources:
        limits:
          memory: 800M
        reservations:
          memory: 256M
    command: python noir-vps/autonomous_researcher.py

  noir-healer:
    build: .
    container_name: noir-healer
    restart: always
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    networks:
      - noir-net
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 128M
    command: python noir-vps/healer.py

networks:
  noir-net:
    driver: bridge
