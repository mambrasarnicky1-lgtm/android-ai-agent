version: '3.8'

services:
  # OMEGA-SPACE OPTIMIZATION: Shared Base Image (v18.5)
  noir-base:
    build: .
    image: noir-agent-base:latest
    deploy:
      resources:
        limits:
          memory: 1G

  noir-brain:
    image: noir-agent-base:latest
    container_name: noir-brain
    restart: always
    depends_on:
      - noir-base
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    networks:
      - noir-net
    deploy:
      resources:
        limits:
          memory: 1500M
    command: sh -c "python noir-vps/brain.py & python noir-vps/perpetual_evolution.py"

  noir-dashboard:
    image: noir-agent-base:latest
    container_name: noir-dashboard
    restart: always
    depends_on:
      - noir-base
    working_dir: /app/noir-ui
    volumes:
      - ./.env:/app/.env
      - ./noir-ui:/app/noir-ui
    ports:
      - "80:80"
    command: gunicorn --bind 0.0.0.0:80 --workers 3 web_server:app
    networks:
      - noir-net
    deploy:
      resources:
        limits:
          memory: 800M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  noir-telegram:
    image: noir-agent-base:latest
    container_name: noir-telegram
    restart: always
    depends_on:
      - noir-base
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
    networks:
      - noir-net
    command: python noir-vps/telegram_bot.py

  noir-researcher:
    image: noir-agent-base:latest
    container_name: noir-researcher
    restart: always
    depends_on:
      - noir-base
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
    networks:
      - noir-net
    command: python noir-vps/autonomous_researcher.py

  noir-healer:
    image: noir-agent-base:latest
    container_name: noir-healer
    restart: always
    depends_on:
      - noir-base
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
    networks:
      - noir-net
    command: python noir-vps/healer.py

networks:
  noir-net:
    driver: bridge
