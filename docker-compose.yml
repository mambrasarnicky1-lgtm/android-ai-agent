version: '3.8'

services:
  noir-brain:
    build: .
    container_name: noir-brain
    restart: always
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    networks:
      - noir-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/noir-vps/brain.py') else 1)"]
      interval: 1m
      timeout: 10s
      retries: 3

  noir-dashboard:
    build: .
    container_name: noir-dashboard
    restart: always
    working_dir: /app/noir-ui
    volumes:
      - ./.env:/app/.env
      - ./noir-ui:/app/noir-ui
    ports:
      - "80:80"
    command: python web_server.py
    networks:
      - noir-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 1m
      timeout: 10s
      retries: 3

  noir-telegram:
    build: .
    container_name: noir-telegram
    restart: always
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - ./noir-vps:/app/noir-vps
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    networks:
      - noir-net
    command: python noir-vps/telegram_bot.py

networks:
  noir-net:
    driver: bridge
